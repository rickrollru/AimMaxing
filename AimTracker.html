<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AimTracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap');

  :root{
    --accent:#ff4655;
    --accent-rgb:255,70,85;
    --panel-rgb:26,17,20;
    --bg-base:#0b0709;
    --border: rgba(255,70,85,0.18);
    --text:#f2e9ea;
    --text-dim:#a8969a;
    --text-faint:#6e5c60;
    --blur-amt:24px;
    --panel-alpha:0.6;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    color:var(--text);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    background:var(--bg-base);
    overflow-x:hidden;
    animation: bodyFadeIn .5s ease;
  }
  .body-bg{
    position:fixed; inset:-40px; z-index:-1;
    background-size:cover; background-position:center;
    filter:blur(var(--blur-amt));
    transform:scale(1.08);
    background-color:var(--bg-base);
  }
  .body-bg::after{
    content:""; position:absolute; inset:0;
    background:
      radial-gradient(ellipse 1000px 600px at 20% 0%, rgba(var(--accent-rgb),0.16), transparent 60%),
      radial-gradient(ellipse 800px 500px at 100% 100%, rgba(var(--accent-rgb),0.10), transparent 55%);
  }
  .body-bg::before{
    content:""; position:absolute; inset:0; opacity:0.35;
    background-image:
      linear-gradient(rgba(var(--accent-rgb),0.07) 1px, transparent 1px),
      linear-gradient(90deg, rgba(var(--accent-rgb),0.07) 1px, transparent 1px);
    background-size:46px 46px;
    animation: gridDrift 26s linear infinite;
    mask-image: radial-gradient(ellipse 900px 700px at 30% 10%, black, transparent 70%);
  }
  @keyframes gridDrift{ from{ background-position:0 0, 0 0; } to{ background-position:120px 160px, 120px 160px; } }

  @keyframes bodyFadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes softFadeIn{ from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:translateY(0);} }
  @keyframes popIn{ 0%{transform:scale(0.6); opacity:0;} 60%{transform:scale(1.15);} 100%{transform:scale(1); opacity:1;} }
  @keyframes pulseGlow{ 0%,100%{ box-shadow:0 0 6px 1px rgba(var(--accent-rgb),0.7); } 50%{ box-shadow:0 0 14px 4px rgba(var(--accent-rgb),0.95); } }
  @keyframes shimmerBar{ 0%{ background-position:-200% 0; } 100%{ background-position:200% 0; } }

  .statusbar, .profile-card, .timer-panel, .playlist-item, .meta-table, .cal-panel, .agent-detail{
    transition:box-shadow .25s ease, transform .25s ease, border-color .25s ease;
  }
  .statusbar:hover, .profile-card:hover, .timer-panel:hover{
    border-color: rgba(var(--accent-rgb),0.4);
    box-shadow:0 8px 34px rgba(0,0,0,0.35), 0 0 0 1px rgba(var(--accent-rgb),0.12), 0 0 28px rgba(var(--accent-rgb),0.10);
  }
  .playlist-item:hover{ border-color: rgba(var(--accent-rgb),0.45); box-shadow:0 6px 22px rgba(0,0,0,0.3), 0 0 18px rgba(var(--accent-rgb),0.12); transform:translateY(-2px); }

  .shell{ display:flex; min-height:100vh; }

  /* ---------- SIDEBAR (Hyprland-style dock) ---------- */
  .sidebar{
    width:220px; flex-shrink:0;
    background:rgba(var(--panel-rgb), var(--panel-alpha));
    backdrop-filter:blur(18px); -webkit-backdrop-filter:blur(18px);
    border-right:1px solid var(--border);
    padding:22px 14px;
    display:flex; flex-direction:column; gap:4px;
    position:sticky; top:0; height:100vh;
    transition:width .22s ease, padding .22s ease;
  }
  /* ---------- SIDEBAR COLLAPSE TOGGLE (desktop only) ---------- */
  .sidebar-toggle{
    position:absolute; top:24px; right:-12px; width:24px; height:24px; border-radius:50%;
    background:var(--bg-base); border:1px solid var(--border); color:var(--text-dim);
    display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; z-index:5;
    transition:border-color .2s ease, color .2s ease, box-shadow .2s ease;
  }
  .sidebar-toggle svg{ width:13px; height:13px; transition:transform .22s ease; }
  .sidebar-toggle:hover{ border-color:var(--accent); color:var(--accent); box-shadow:0 0 10px rgba(var(--accent-rgb),0.25); }
  .sidebar.collapsed .sidebar-toggle svg{ transform:rotate(180deg); }
  @media (max-width:760px){ .sidebar-toggle{ display:none; } }

  /* только десктоп — на мобильной раскладке сайдбар превращается в нижнюю панель (см. медиа-запрос
     ниже) и правило схлопывания там не нужно и не должно перебивать её ширину */
  @media (min-width:761px){
    .sidebar.collapsed{ width:72px; padding-left:10px; padding-right:10px; }
    .sidebar.collapsed .brand-text,
    .sidebar.collapsed .side-item span,
    .sidebar.collapsed .sidebar-foot{ display:none; }
    .sidebar.collapsed .sidebar-brand{ justify-content:center; padding-left:0; padding-right:0; }
    .sidebar.collapsed .side-item{ justify-content:center; padding-left:0; padding-right:0; }
    .sidebar.collapsed .side-item:hover{ transform:none; }
  }
  .sidebar-brand{
    font-family:'Sora', sans-serif; font-weight:800; font-size:15px; letter-spacing:0.5px;
    color:var(--text); padding:6px 10px 20px 10px;
    display:flex; align-items:center; gap:10px;
  }
  .sidebar-brand{ cursor:pointer; transition:opacity .15s ease; }
  .sidebar-brand:hover{ opacity:0.8; }
  .sidebar-brand .dot{ width:9px; height:9px; border-radius:50%; background:var(--accent); animation:pulseGlow 2.2s ease-in-out infinite; }
  .side-item{
    display:flex; align-items:center; gap:12px;
    background:transparent; border:none; border-radius:12px;
    color:var(--text-dim); font-family:'Inter', sans-serif; font-size:13.5px; font-weight:500;
    padding:11px 12px; cursor:pointer; text-align:left; width:100%;
    transition:background .2s ease, color .2s ease;
  }
  .side-item svg{ width:17px; height:17px; flex-shrink:0; opacity:0.85; }
  .side-item{ transition:background .2s ease, color .2s ease, transform .2s ease; }
  .side-item:hover{ background:rgba(255,255,255,0.06); color:var(--text); transform:translateX(2px); }
  .side-item.active{
    background:rgba(var(--accent-rgb),0.16); color:var(--text);
    box-shadow:inset 2px 0 0 var(--accent), 0 0 16px rgba(var(--accent-rgb),0.18);
  }
  .side-item.active svg{ opacity:1; color:var(--accent); }
  .sidebar-spacer{ flex:1; }
  .sidebar-foot{
    font-family:'IBM Plex Mono', monospace; font-size:9.5px; color:var(--text-faint);
    padding:10px 10px 0 10px; border-top:1px solid var(--border); margin-top:6px;
  }

  /* ---------- ONBOARDING ---------- */
  .onboarding-overlay{
    position:fixed; inset:0; z-index:200;
    background:rgba(6,4,5,0.72); backdrop-filter:blur(6px);
    display:none; align-items:center; justify-content:center; padding:20px;
  }
  .onboarding-overlay.open{ display:flex; animation:softFadeIn .3s ease; }
  .onboarding-card{
    max-width:440px; width:100%; text-align:center;
    background:rgba(var(--panel-rgb), 0.92); backdrop-filter:blur(20px);
    border:1px solid var(--border); border-radius:22px;
    padding:38px 32px 32px; box-shadow:0 20px 60px rgba(0,0,0,0.5);
  }
  .onboarding-dot{
    width:14px; height:14px; border-radius:50%; background:var(--accent); margin:0 auto 18px;
    box-shadow:0 0 24px rgba(var(--accent-rgb),0.7); animation:pulseGlow 2.2s ease-in-out infinite;
  }
  .onboarding-title{
    font-family:'Sora', sans-serif; font-weight:800; font-size:30px; letter-spacing:-0.5px;
    color:var(--text); margin:0 0 14px 0;
  }
  .onboarding-pitch{
    font-size:13.5px; line-height:1.55; color:var(--text-dim); margin:0 0 28px 0;
  }
  .onboarding-actions{ display:flex; flex-direction:column; gap:10px; }
  .onboarding-btn{
    display:flex; flex-direction:column; align-items:center; gap:3px;
    border-radius:14px; padding:14px 18px; cursor:pointer; font-family:'Inter', sans-serif;
    font-size:14.5px; font-weight:600; border:1px solid var(--border); transition:all .2s ease;
  }
  .onboarding-btn span{ font-family:'IBM Plex Mono', monospace; font-size:10px; font-weight:400; color:var(--text-faint); }
  .onboarding-btn.secondary{ background:rgba(255,255,255,0.03); color:var(--text); }
  .onboarding-btn.secondary:hover{ border-color:var(--text-dim); }
  .onboarding-btn.primary{ background:var(--accent); color:#11111b; border-color:var(--accent); }
  .onboarding-btn.primary:hover{ filter:brightness(1.08); transform:translateY(-1px); }
  .onboarding-btn.primary span{ color:rgba(17,17,27,0.65); }
  .more-trigger{ display:none; }
  @media (max-width:760px){
    .shell{ flex-direction:column; }
    .sidebar{
      width:100%; height:auto; position:fixed; bottom:0; left:0; top:auto;
      display:flex; flex-direction:row; align-items:stretch;
      padding:8px 6px; border-right:none; border-top:1px solid var(--border);
      z-index:50; gap:2px;
    }
    .sidebar-brand, .sidebar-foot{ display:none; }
    .sidebar-spacer{ display:none; }
    .side-item{
      flex:1 1 0; flex-direction:column; gap:4px; font-size:9.5px; padding:8px 4px;
      border-radius:10px; min-width:0;
    }
    .side-item span{ line-height:1.1; }
    .side-item.active{ box-shadow:none; background:rgba(var(--accent-rgb),0.16); }
    .side-item.mobile-overflow{ display:none; }
    .more-trigger{ display:flex; }
    .content{ padding-bottom:82px !important; }
  }

  .more-sheet-backdrop{
    position:fixed; inset:0; background:rgba(0,0,0,0.55); z-index:60;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .more-sheet-backdrop.open{ opacity:1; pointer-events:auto; }
  .more-sheet{
    position:fixed; left:0; right:0; bottom:0; z-index:61;
    background:rgba(var(--panel-rgb), 0.97); backdrop-filter:blur(20px);
    border-top:1px solid var(--border); border-radius:20px 20px 0 0;
    padding:10px 18px 26px; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1);
    max-height:70vh; overflow-y:auto;
  }
  .more-sheet.open{ transform:translateY(0); }
  .more-sheet-handle{ width:36px; height:4px; border-radius:2px; background:var(--border); margin:2px auto 14px; }
  .more-sheet-title{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:var(--text-faint); margin-bottom:12px;
  }
  .more-sheet-grid{ display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; }
  .more-sheet-item{
    display:flex; flex-direction:column; align-items:center; gap:6px;
    background:transparent; border:1px solid var(--border); border-radius:12px;
    color:var(--text-dim); font-family:'Inter', sans-serif; font-size:10.5px; font-weight:500;
    padding:14px 6px; cursor:pointer;
  }
  .more-sheet-item svg{ width:19px; height:19px; opacity:0.85; }
  .more-sheet-item:active{ background:rgba(var(--accent-rgb),0.14); border-color:var(--accent); color:var(--text); }
  @media (min-width:761px){ .more-sheet, .more-sheet-backdrop{ display:none; } }

  .content{ flex:1; min-width:0; padding:32px 30px 60px; }
  @media (max-width:600px){
    .content{ padding:18px 14px 24px; }
    h1{ font-size:21px; margin-bottom:16px; }
    .statusbar{ padding:18px 18px; }
    .stats-row{ grid-template-columns:repeat(2, 1fr); row-gap:16px; }
    .stat:nth-child(3){ border-left:none; padding-left:0; }
    .stat-value, .stat-input{ font-size:16px; }
  }

  .view{ display:none; animation: softFadeIn .3s ease; }
  .view.active{ display:block; }

  .wrap{max-width:900px;}

  .statusbar{
    border:1px solid var(--border); border-radius:18px;
    background:rgba(var(--panel-rgb), var(--panel-alpha));
    backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    padding:22px 26px; position:relative; overflow:hidden;
    box-shadow:0 8px 30px rgba(0,0,0,0.25);
    margin-bottom:8px;
  }
  .statusbar::before{
    content:""; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg, transparent, var(--accent) 50%, transparent);
    background-size:200% 100%;
    animation: shimmerBar 3.5s ease-in-out infinite;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:3px; color:var(--accent);
    text-transform:uppercase; margin-bottom:8px;
  }
  h1{
    font-family:'Sora', sans-serif; font-weight:700; font-size:28px;
    letter-spacing:-0.5px; margin:0 0 22px 0; color:var(--text); line-height:1.25;
  }
  .stats-row{ display:grid; grid-template-columns:repeat(4, 1fr); gap:0; border-top:1px solid var(--border); padding-top:18px; }
  .stat{ min-width:0; padding:0 18px; border-left:1px solid var(--border); }
  .stat:first-child{border-left:none; padding-left:0;}
  .stat-label{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:1.5px;
    color:var(--text-faint); text-transform:uppercase; margin-bottom:8px;
  }
  .stat-value{ font-family:'Sora', sans-serif; font-size:20px; font-weight:600; color:var(--text); }
  .stat-value.accent{color:var(--accent);}
  .stat-input{
    font-family:'Sora', sans-serif; font-size:20px; font-weight:600;
    background:transparent; border:none; border-bottom:1px solid transparent;
    color:var(--text); width:100%; padding:0 0 2px 0; transition:border-color .2s ease;
  }
  .stat-input.accent{color:var(--accent);}
  .stat-input:focus{outline:none; border-bottom:1px solid var(--accent);}
  .stat-input::placeholder{color:var(--text-faint);}
  .stat-input.synced-from-valo{ color:var(--accent); cursor:default; }

  .section-label{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:2.5px;
    text-transform:uppercase; color:var(--text-faint); margin:28px 0 12px 2px;
    display:flex; align-items:center; gap:10px;
  }
  .section-label::after{ content:""; flex:1; height:1px; background:var(--border); }
  .section-label.sub{ margin-top:20px; font-size:10px; color:var(--accent); }

  .day-nav{ display:flex; align-items:center; gap:10px; margin:28px 0 12px 2px; flex-wrap:wrap; }
  .nav-btn{
    font-family:'IBM Plex Mono', monospace;
    background:rgba(var(--panel-rgb), var(--panel-alpha)); border:1px solid var(--border); border-radius:10px;
    color:var(--text-dim); width:30px; height:30px; cursor:pointer; font-size:14px;
    display:flex; align-items:center; justify-content:center; transition:all .2s ease;
  }
  .nav-btn:hover{border-color:var(--accent); color:var(--accent); transform:translateY(-1px);}
  .day-nav-date{ font-family:'IBM Plex Mono', monospace; font-size:13px; color:var(--accent); min-width:110px; }
  .today-btn{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:1px;
    background:transparent; border:1px solid var(--border); border-radius:8px; color:var(--text-faint);
    padding:7px 12px; cursor:pointer; text-transform:uppercase; transition:all .2s ease;
  }
  .today-btn:hover{border-color:var(--accent); color:var(--accent);}
  .today-btn.hidden{display:none;}
  .day-nav::after{ content:""; flex:1; height:1px; background:var(--border); margin-left:4px; }

  .duty-grid{ display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  @media (max-width:720px){ .duty-grid{grid-template-columns:1fr;} }

  .duty-panel{
    background:rgba(var(--panel-rgb), var(--panel-alpha)); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border); border-radius:16px; overflow:hidden;
    transition:border-color .2s ease;
  }
  .duty-panel:hover{ border-color:rgba(var(--accent-rgb),0.4); }
  .duty-head{
    padding:14px 18px; border-bottom:1px solid var(--border);
    display:flex; justify-content:space-between; align-items:center;
  }
  .duty-title{ font-family:'Sora', sans-serif; font-size:16px; font-weight:600; }
  .duty-count{ font-family:'IBM Plex Mono', monospace; font-size:12px; color:var(--text-dim); }
  .duty-list{padding:6px 0;}
  .task{
    display:flex; align-items:flex-start; gap:12px; padding:13px 18px;
    border-bottom:1px solid var(--border); cursor:pointer; transition:background .2s ease;
  }
  .task:last-child{border-bottom:none;}
  .task:hover{background:rgba(255,255,255,0.04);}
  .task.done{background:rgba(var(--accent-rgb),0.06);}
  .task.done .task-name{color:var(--text-dim); text-decoration:line-through; text-decoration-color:var(--text-faint);}
  .checkbox{
    width:19px; height:19px; border:1.5px solid var(--text-faint); border-radius:6px; flex-shrink:0;
    margin-top:2px; position:relative; transition:border-color .2s ease, background .2s ease;
  }
  .task.done .checkbox{background:var(--accent); border-color:var(--accent); animation:popIn .3s ease;}
  .task.done .checkbox::after{
    content:""; position:absolute; left:5px; top:2px; width:6px; height:10px;
    border:solid #11111b; border-width:0 2px 2px 0; transform:rotate(40deg);
  }
  .task:hover .checkbox{border-color:var(--accent);}
  .task-body{flex:1;}
  .task-name{ font-size:14px; font-weight:500; color:var(--text); }
  .task-meta{ font-family:'IBM Plex Mono', monospace; font-size:11px; color:var(--text-faint); margin-top:3px; }

  .day-summary{
    background:rgba(var(--panel-rgb), var(--panel-alpha)); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border); border-radius:16px; padding:16px 18px;
  }
  .day-note{
    width:100%; background:rgba(0,0,0,0.25); border:1px solid var(--border); border-radius:10px; color:var(--text);
    font-family:'Inter', sans-serif; font-size:13px; padding:12px 14px; resize:vertical; min-height:70px;
  }
  .day-note::placeholder{color:var(--text-faint);}
  .day-note:focus{outline:none; border-color:var(--accent);}

  .loadout-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media (max-width:600px){ .loadout-grid{grid-template-columns:1fr;} }
  .loadout-card{
    background:rgba(var(--panel-rgb), var(--panel-alpha)); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border); border-radius:14px; padding:14px 16px;
    transition:border-color .2s ease, transform .2s ease;
  }
  .loadout-card:hover{ border-color:rgba(var(--accent-rgb),0.5); transform:translateY(-2px); }
  .loadout-tag{
    font-family:'IBM Plex Mono', monospace; font-size:10px; letter-spacing:2px;
    color:var(--accent); text-transform:uppercase; margin-bottom:8px;
  }
  .loadout-code-row{ display:flex; align-items:center; gap:10px; }
  .loadout-code{
    font-family:'IBM Plex Mono', monospace; font-size:12.5px; color:var(--text);
    background:rgba(0,0,0,0.25); border:1px solid var(--border); border-radius:8px; padding:8px 10px; flex:1;
    overflow-x:auto; white-space:nowrap;
  }
  .copy-btn{
    font-family:'IBM Plex Mono', monospace; font-size:11px; letter-spacing:1px;
    background:transparent; border:1px solid rgba(var(--accent-rgb),0.5); border-radius:8px; color:var(--accent);
    padding:8px 12px; cursor:pointer; text-transform:uppercase; transition:all .2s ease; flex-shrink:0;
  }
  .copy-btn:hover{background:var(--accent); color:#11111b;}
  .copy-btn.copied{background:var(--accent); color:#11111b;}

  .video-list{
    background:rgba(var(--panel-rgb), var(--panel-alpha)); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
    border:1px solid var(--border); border-radius:16px; overflow:hidden;
  }
  .video-item{
    display:flex; align-items:center; gap:14px; padding:14px 18px;
    border-bottom:1px solid var(--border); text-decoration:none; color:inherit; transition:background .2s ease;
  }
  .video-item:last-child{border-bottom:none;}
  .video-item:hover{background:rgba(255,255,255,0.05);}
  .play-icon{
    width:28px; height:28px; border:1.5px solid rgba(var(--accent-rgb),0.5); border-radius:9px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; transition:all .2s ease;
  }
  .video-item:hover .play-icon{ border-color:var(--accent); }
  .play-icon::after{
    content:""; width:0; height:0; border-top:5px solid transparent; border-bottom:5px solid transparent;
    border-left:8px solid var(--accent); margin-left:2px;
  }
  .video-text{flex:1;}
  .video-title{font-size:13.5px; font-w
